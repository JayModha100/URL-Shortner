services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: maven:3.9-eclipse-temurin-21
    container_name: spring-app
    working_dir: /app
    volumes:
      - .:/app
    command: mvn spring-boot:run
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  pgdata: